<!-- NEW NAVBAR MOBILE -->
<!-- From Uiverse.io by Admin12121 -->
<nav class="menu">
    @for(item of menuItems(); track item; let i = $index) {
    <a [routerLink]="item.route" class="link relative mx-1" [class.active]="i === activeIndex()" (click)="setActive(i)">
            <span class="link-icon text-2xl">
                <mat-icon>{{item.icon}}</mat-icon>
            </span>
    
            @if(item.route === '/cart' && totalItens() > 0) {
            <p-badge class="bagde-icon" [value]="totalItens()" severity="info" />
            }
        <span class="link-title" [class.expanded]="activeIndex()">{{item.label}}</span>
    </a>
    }
</nav>
